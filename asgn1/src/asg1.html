<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>ASG 1 — WebGL Paint</title>
    <script src="../lib/webgl-utils.js"></script>
    <script src="../lib/webgl-debug.js"></script>
    <script src="../lib/cuon-utils.js"></script>
    <script src="Triangle.js"></script>
    <script src="Circle.js"></script>
    <script src="asg1.js"></script>

    <style>
      body {
        font-family: sans-serif;
        margin: 16px;
      }
      .submit-meta {
        border: 1px solid #ccc;
        padding: 12px 14px;
        margin-bottom: 16px;
        max-width: 560px;
        background: #fafafa;
      }
      .submit-meta p {
        margin: 6px 0;
        font-size: 0.95rem;
      }
      .row {
        margin: 10px 0;
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px 12px;
      }
      .row-label {
        font-weight: 600;
        margin-right: 4px;
      }
      .color-row label {
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }
      .size-row {
        display: flex;
        flex-wrap: wrap;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        max-width: 560px;
      }
      .size-row label {
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }
      input[type="range"] {
        vertical-align: middle;
      }
      .awesome-note {
        font-size: 0.9rem;
        color: #333;
        margin-top: 14px;
      }
      .ref-block {
        margin-top: 20px;
      }
    </style>
  </head>

  <body onload="main()">
    <!-- Grader meta: name, email. -->
    <div class="submit-meta">
      <p><strong>Name:</strong> Sherry Shi</p>
      <p><strong>UCSC Email:</strong> Yshi162@ucsc.edu</p>
    </div>

    <!-- Canvas: id webgl used in asg1.js. -->
    <canvas id="webgl" width="400" height="400">
      Please use a browser that supports "canvas"
    </canvas>

    <!-- Clear button: empty shape list. -->
    <div class="row">
      <button type="button" id="btnClear">Clear Canvas</button>
    </div>

    <!-- Mode buttons, demo picture load, undo last shape. -->
    <div class="row">
      <span class="row-label">Drawing Mode:</span>
      <button type="button" id="btnPoint">Squares</button>
      <button type="button" id="btnTriangle">Triangles</button>
      <button type="button" id="btnCircle">Circles</button>
      <span style="margin-left: 12px"></span>
      <button type="button" id="btnDemo">Draw picture</button>
      <button type="button" id="btnUndo">Undo last shape</button>
    </div>

    <!-- Color sliders: redS, greenS, blueS. -->
    <div class="row color-row">
      <span class="row-label">Shape Color:</span>
      <label for="redS">Red <input type="range" id="redS" min="0" max="255" value="255" /></label>
      <label for="greenS">Green <input type="range" id="greenS" min="0" max="255" value="0" /></label>
      <label for="blueS">Blue <input type="range" id="blueS" min="0" max="255" value="0" /></label>
    </div>

    <!-- Size slider; circle segment slider. -->
    <div class="row size-row">
      <label for="sizeS">Shape Size: <input type="range" id="sizeS" min="2" max="40" value="10" /></label>
      <label for="segS">(Circles) Segment Count: <input type="range" id="segS" min="3" max="64" value="16" /></label>
    </div>

    <!-- Extra feature note: partial undo. -->
    <p class="awesome-note">
      <strong>Awesome:</strong> Undo drops only the last shape; canvas stays otherwise.
    </p>

    <!-- Draw-picture text + reference scan. -->
    <div class="ref-block">
      <p>This is my 'draw picture', stem shaped like letter S (my initial).</p>
      <img
        id="refImg"
        src="reference.jpg"
        alt="Hand-drawn reference for draw picture"
        width="240"
        style="border: 1px solid #ccc"
      />
    </div>
  </body>
</html>

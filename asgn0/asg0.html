<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Assignment 0</title>
</head>
<body onload="main()">
  <canvas id="example" width="400" height="400"></canvas>

  <div style="margin-top: 14px;">
    <div>
      v1:
      x <input id="v1x" type="text" size="6">
      y <input id="v1y" type="text" size="6">
    </div>

    <div style="margin-top: 6px;">
      v2:
      x <input id="v2x" type="text" size="6">
      y <input id="v2y" type="text" size="6">
    </div>

    <div style="margin-top: 8px;">
      <button onclick="handleDrawEvent()">Draw</button>
    </div>

    <div style="margin-top: 14px;">
      Operation:
      <select id="operation">
        <option value="add">Add</option>
        <option value="sub">Subtract</option>
        <option value="mul">Multiply</option>
        <option value="div">Divide</option>
        <option value="magnitude">Magnitude</option>
        <option value="normalize">Normalize</option>
        <option value="angle">Angle Between</option>
        <option value="area">Area</option>
      </select>

      Scalar:
      <input id="scalar" type="text" size="6">

      <button onclick="handleDrawOperationEvent()">Draw</button>
    </div>
  </div>

  <script src="lib/cuon-matrix-cse160.js"></script>
  <script src="asg0.js"></script>
</body>
</html>
